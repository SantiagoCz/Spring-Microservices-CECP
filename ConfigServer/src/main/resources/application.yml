server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/SantiagoCz/Spring-Microservices-CECP.git
          search-paths: config-data
          default-label: main
          username: ${GIT_USER}
          password: ${GIT_PASSWORD}