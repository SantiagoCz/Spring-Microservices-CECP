server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/affiliates_cecp_db?serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  affiliates:
    payslips-root: ${PAYSLIPS_ROOT:/opt/cecp/affiliates/payslips}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true